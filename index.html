<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumora</title>
    <script src="https://kit.fontawesome.com/40c404fce8.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elsie+Swash+Caps:wght@400;900&family=Mea+Culpa&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Lumora</h1>
        <h2 id="location-country"></h2>
    </header>
    <main>
        <section id="location-selection">
            <div class="location-buttons">
                <button id="current-location">Current Location</button>
                <button id="search-location">Search Location</button>
            </div>
            <form id="search-form">
                <input
                    name="Search"
                    type="text"
                    id="location-input"
                    placeholder="Enter location (city)"
                />
                <div id="suggestions" class="suggestions-dropdown"></div>
                
            </form>
        </section>
        <section id="unit-selection">
            <div class="temperature">
                <button id="celsius" class="unit-button active">°C</button>
                <button id="fahrenheit" class="unit-button">°F</button>
            </div>
            <div class="wind-speed">
                <button id="kmh" class="unit-button active">km/h</button>
                <button id="mph" class="unit-button">mph</button>
            </div>
            <div class="measurement">
                <button id="metric" class="unit-button active">mm</button>
                <button id="imperial" class="unit-button">in</button>
            </div>
        </section>

        <h2 id="location-name"></h2>
        <div id="weather-tabs">
            <button class="tab-button" data-tab="current">Current</button>
            <button class="tab-button" data-tab="hourly">Hourly</button>
            <button class="tab-button" data-tab="daily">Daily</button>
        </div>

        <section id="weather-info">
            <section id="current" class="weather-section">
                <div>
                    <div id="current-weather-emoji"></div>
                    <div id="current-temperature"></div>
                    <div id="current-feels-like"></div>
                    <div id="current-weather-description"></div>

                    <section id="current-weather-details">
                        <div id="current-humidity"></div>
                        <div id="current-cloud-cover"></div>
                        <div id="current-wind"></div>
                    </section>
                </div>
            </section>
            <section id="hourly" class="weather-section"></section>
            <section id="daily" class="weather-section"></section>
        </section>
    </main>
    <footer>

    </footer>
    <script type="module" src="./js/script.js"></script>
</body>
</html>
